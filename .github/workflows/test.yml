name: test

on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql/mysql-server:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      RAILS_ENV: test
    steps:
      - name: Verify mysql connection
        run: |
          mysql --host ${{ env.DB_HOST }} --port ${{ env.DB_PORT }} -u${{ env.DB_USERNAME}} -p${{ env.DB_PASSWORD }} -e "SHOW DATABASES"

      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
          npm ci

      - name: Setup config files for CI
        run: |
          cp .env.example .env

      - name: Setup Database
        run: |
          ./bin/rails db:create
          ./bin/rails db:migrate

      - name: Run E2E tests with Cypress
        uses: cypress-io/github-action@v6
        with:
          start: bundle exec rails server -e test -p 3000
          wait-on: "http://localhost:3000"
          browser: chrome
          config: baseUrl=http://localhost:3000

      - name: Upload test screenshots if any
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-snapshots
          path: cypress/snapshots

      - name: Run RSpec
        run: bundle exec rspec
